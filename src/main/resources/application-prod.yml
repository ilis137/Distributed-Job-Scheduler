# Production Profile Configuration

spring:
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/scheduler_prod}
    username: ${DB_USERNAME:scheduler_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  # JPA Configuration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none  # Changed from 'validate' to 'none' - Flyway handles schema management
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: false
    clean-disabled: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# Logging Configuration
logging:
  level:
    com.scheduler: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.redisson: INFO
  file:
    name: /var/log/scheduler/scheduler-prod.log
    max-size: 100MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Scheduler Configuration
scheduler:
  node:
    id: ${HOSTNAME:unknown}-${SERVER_PORT:8080}
  leader-election:
    enabled: true
    lock-ttl-seconds: 10
    heartbeat-interval-seconds: 3
  job-execution:
    thread-pool-size: 50
    max-retry-attempts: 3

