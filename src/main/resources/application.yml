# Distributed Job Scheduler - Main Configuration
# This file contains the base configuration that applies to all profiles

spring:
  application:
    name: distributed-job-scheduler
  
  # Active profile (dev, prod, test)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # JPA Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none  # Flyway manages schema - no Hibernate validation
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: true
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Management & Actuator Configuration
# Minimal configuration for Phase 1-3 (Core functionality)
# Full observability features will be enabled in Phase 4
management:
  endpoints:
    web:
      exposure:
        # Minimal endpoints for essential monitoring
        include: health,info
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

  # Metrics disabled until Phase 4
  # Uncomment when implementing observability
  # metrics:
  #   export:
  #     prometheus:
  #       enabled: true
  #   tags:
  #     application: ${spring.application.name}
  #     environment: ${spring.profiles.active}

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Logging Configuration
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.scheduler: INFO
    org.springframework: INFO
    org.hibernate: INFO

# Scheduler Configuration
scheduler:
  # Node identification
  node:
    id: ${HOSTNAME:localhost}-${SERVER_PORT:8080}
  
  # Leader election configuration
  leader-election:
    enabled: true
    lock-key: "scheduler:leader"
    lock-ttl-seconds: 10
    heartbeat-interval-seconds: 3
  
  # Job execution configuration
  job-execution:
    thread-pool-size: 50
    max-retry-attempts: 3
    initial-retry-delay-seconds: 30
    max-retry-delay-seconds: 300
    retry-backoff-multiplier: 2.0
  
  # Distributed lock configuration
  distributed-lock:
    lock-ttl-seconds: 60
    wait-time-seconds: 5
    lease-time-seconds: 60

  # Orphaned job recovery configuration
  recovery:
    enabled: true
    interval-seconds: 60
    initial-delay-seconds: 30
    stuck-job-threshold-minutes: 5

