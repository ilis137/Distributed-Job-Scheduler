# Development Profile Configuration

spring:
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3305/scheduler_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none  # Changed from 'validate' to 'none' - Flyway handles schema management
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
        use_sql_comments: true

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false  # Allow clean in dev for testing

  # Redis Configuration (Redisson)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Logging Configuration
logging:
  level:
    com.scheduler: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.redisson: DEBUG
  file:
    name: logs/scheduler-dev.log
    max-size: 10MB
    max-history: 7

# Scheduler Configuration
scheduler:
  leader-election:
    enabled: true
  job-execution:
    thread-pool-size: 10

