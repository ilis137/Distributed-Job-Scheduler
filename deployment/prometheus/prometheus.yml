# Prometheus Configuration for Distributed Job Scheduler

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'distributed-job-scheduler'
    environment: 'dev'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Scheduler Node 1
  - job_name: 'scheduler-node-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scheduler-node-1:8080']
        labels:
          node: 'scheduler-node-1'
          role: 'leader-candidate'

  # Scheduler Node 2
  - job_name: 'scheduler-node-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scheduler-node-2:8081']
        labels:
          node: 'scheduler-node-2'
          role: 'follower'

  # Scheduler Node 3
  - job_name: 'scheduler-node-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scheduler-node-3:8082']
        labels:
          node: 'scheduler-node-3'
          role: 'follower'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

