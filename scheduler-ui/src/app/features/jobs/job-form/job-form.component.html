<div class="job-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Job' : 'Create New Job' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="error" class="error-message">{{ error }}</div>

      <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Job Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter job name" required>
          <mat-error *ngIf="jobForm.get('name')?.hasError('required')">
            Job name is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3" placeholder="Enter job description"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Cron Expression</mat-label>
          <input matInput formControlName="cronExpression" placeholder="e.g., 0 0 * * * (every hour)">
          <mat-hint>Leave empty for one-time execution</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Max Retries</mat-label>
          <input matInput type="number" formControlName="maxRetries" min="0" max="10">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Timeout (seconds)</mat-label>
          <input matInput type="number" formControlName="timeoutSeconds" min="1">
        </mat-form-field>

        <mat-checkbox formControlName="enabled">Enabled</mat-checkbox>

        <div class="form-actions">
          <button mat-raised-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="jobForm.invalid || loading">
            {{ isEditMode ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
