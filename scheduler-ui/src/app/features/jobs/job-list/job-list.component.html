<div class="job-list-container">
  <div class="header">
    <h1>Jobs</h1>
    <button mat-raised-button color="primary" routerLink="/jobs/create">
      <mat-icon>add</mat-icon>
      Create Job
    </button>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="loading" class="loading-container">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!loading && jobs.length === 0" class="empty-state">
    <mat-icon>work_off</mat-icon>
    <p>No jobs found. Create your first job to get started.</p>
    <button mat-raised-button color="primary" routerLink="/jobs/create">
      Create Job
    </button>
  </div>

  <div *ngIf="!loading && jobs.length > 0" class="table-container">
    <table mat-table [dataSource]="jobs" class="jobs-table">
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let job">{{ job.id }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let job">
          <a [routerLink]="['/jobs', job.id]" class="job-link">{{ job.name }}</a>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let job">
          <span class="status-badge" [ngClass]="getStatusClass(job.status)">
            {{ job.status }}
          </span>
        </td>
      </ng-container>

      <!-- Cron Expression Column -->
      <ng-container matColumnDef="cronExpression">
        <th mat-header-cell *matHeaderCellDef>Schedule</th>
        <td mat-cell *matCellDef="let job">
          <code *ngIf="job.cronExpression">{{ job.cronExpression }}</code>
          <span *ngIf="!job.cronExpression" class="text-muted">One-time</span>
        </td>
      </ng-container>

      <!-- Next Run Time Column -->
      <ng-container matColumnDef="nextRunTime">
        <th mat-header-cell *matHeaderCellDef>Next Run</th>
        <td mat-cell *matCellDef="let job">
          <span *ngIf="isFutureTime(job.nextRunTime)">{{ job.nextRunTime | date:'short' }}</span>
          <span *ngIf="!isFutureTime(job.nextRunTime)" class="text-muted">-</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let job">
          <button mat-icon-button [matMenuTriggerFor]="menu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item [routerLink]="['/jobs', job.id]">
              <mat-icon>visibility</mat-icon>
              <span>View Details</span>
            </button>
            <button mat-menu-item [routerLink]="['/jobs', job.id, 'edit']">
              <mat-icon>edit</mat-icon>
              <span>Edit</span>
            </button>
            <button mat-menu-item (click)="triggerJob(job)">
              <mat-icon>play_arrow</mat-icon>
              <span>Trigger Now</span>
            </button>
            <button mat-menu-item (click)="pauseJob(job)" *ngIf="job.status !== 'PAUSED'">
              <mat-icon>pause</mat-icon>
              <span>Pause</span>
            </button>
            <button mat-menu-item (click)="resumeJob(job)" *ngIf="job.status === 'PAUSED'">
              <mat-icon>play_arrow</mat-icon>
              <span>Resume</span>
            </button>
            <button mat-menu-item (click)="deleteJob(job)" class="delete-action">
              <mat-icon>delete</mat-icon>
              <span>Delete</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50, 100]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
