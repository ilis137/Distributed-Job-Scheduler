<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">{{ title }}</span>
  <span class="spacer"></span>
  <button mat-icon-button>
    <mat-icon>notifications</mat-icon>
  </button>
</mat-toolbar>

<mat-drawer-container class="app-container">
  <mat-drawer #drawer mode="over" class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/jobs" routerLinkActive="active-link">
        <mat-icon matListItemIcon>work</mat-icon>
        <span matListItemTitle>Jobs</span>
      </a>
      <a mat-list-item routerLink="/cluster" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dns</mat-icon>
        <span matListItemTitle>Cluster Status</span>
      </a>
      <mat-divider></mat-divider>
      <a mat-list-item>
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-drawer>

  <mat-drawer-content class="app-content">
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
